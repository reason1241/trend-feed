<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trend Feed feeds</title>
    <link rel="stylesheet" href="./src/fonts.css" />
    <link rel="stylesheet" href="./src/popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <!-- <p class="popup-kicker">RSS manager</p> -->
        <h1>Trend Feed</h1>
        <p class="popup-copy">Add or delete RSS feed links for your new tab dashboard.</p>
      </header>

      <section class="feed-list-section">
        <div class="list-header">
          <div class="list-heading">
            <h2>Saved feeds</h2>
            <span id="feed-count" class="feed-count">0</span>
          </div>
          <button
            id="toggle-feed-form"
            class="icon-button"
            type="button"
            aria-expanded="false"
            aria-controls="feed-form"
            aria-label="Add feed"
          >
            <img src="./src/assets/svg/plus.svg" alt="" aria-hidden="true" class="icon-button-icon" />
          </button>
        </div>
        <div id="form-status" class="form-status" aria-live="polite"></div>
        <form id="feed-form" class="feed-form" hidden>
          <label class="field">
            <span>Name</span>
            <input id="feed-title" name="title" type="text" placeholder="GitHub Blog" required />
          </label>
          <label class="field">
            <span>RSS URL</span>
            <input
              id="feed-url"
              name="url"
              type="url"
              placeholder="https://example.com/feed.xml"
              required
            />
          </label>
          <button class="primary-button" type="submit">Add feed</button>
        </form>
        <div id="saved-feeds" class="saved-feeds"></div>
      </section>
    </main>

    <template id="saved-feed-template">
      <article class="saved-feed-card">
        <button
          class="drag-handle"
          type="button"
          draggable="true"
          aria-label="Reorder feed"
        >
          <img
            class="drag-handle-icon"
            src="./src/assets/svg/reorder.svg"
            alt=""
            aria-hidden="true"
          />
        </button>
        <div class="saved-feed-copy">
          <strong class="saved-feed-title"></strong>
          <a class="saved-feed-url" target="_blank" rel="noreferrer"></a>
        </div>
        <button class="delete-button" type="button" aria-label="Delete feed">
          <img src="./src/assets/svg/trash.svg" alt="" aria-hidden="true" class="delete-button-icon" />
        </button>
      </article>
    </template>

    <script type="module" src="./src/popup.js"></script>
  </body>
</html>
